<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APRS Passcode Generator</title>
  <meta name="description" content="Tool to generate APRS-IS passcodes based on your station callsign." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-deep:     #080c0e;
      --bg-panel:    #0d1417;
      --bg-card:     #111a1f;
      --border:      #1e3038;
      --accent:      #00e5a0;
      --accent-dim:  #00b07a;
      --accent-glow: rgba(0, 229, 160, 0.18);
      --amber:       #ffb347;
      --text-main:   #cde8df;
      --text-muted:  #4a6e62;
      --text-dim:    #2a4840;
      --error:       #ff4d6d;
      --error-glow:  rgba(255, 77, 109, 0.18);
      --success-glow:rgba(0, 229, 160, 0.25);
      --font-mono:   'Share Tech Mono', monospace;
      --font-head:   'Orbitron', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background-color: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 16px 24px;
      overflow-x: hidden;
    }

    /* Subtle scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Radial background glow */
    body::after {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0,180,120,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header bar ── */
    .header-bar {
      width: 100%;
      max-width: 520px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease both;
    }

    .signal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 20px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .header-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .header-label span { color: var(--accent); }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 40px 32px;
      box-shadow:
        0 0 0 1px rgba(0,229,160,0.04),
        0 8px 40px rgba(0,0,0,0.6),
        0 0 60px rgba(0,180,120,0.04);
      animation: fadeUp 0.7s ease both 0.1s;
    }

    /* Corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent-dim);
      border-style: solid;
      opacity: 0.5;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

    /* ── Title ── */
    .title-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 28px;
    }

    .title-icon {
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(0,229,160,0.5));
      flex-shrink: 0;
      margin-top: 2px;
    }

    .title-text h1 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      line-height: 1.2;
      text-transform: uppercase;
    }

    .title-text p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent-dim) 0%, var(--border) 60%, transparent 100%);
      margin-bottom: 28px;
      opacity: 0.4;
    }

    /* ── Form ── */
    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .field-label span:first-child {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .char-counter {
      font-size: 11px;
      color: var(--text-dim);
      transition: color 0.2s;
    }

    .char-counter.active { color: var(--accent-dim); }
    .char-counter.warn   { color: var(--amber); }

    .input-wrap {
      position: relative;
      margin-bottom: 6px;
    }

    .input-wrap input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 13px 48px 13px 16px;
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent);
      caret-color: var(--accent);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap input::placeholder {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-dim);
    }

    .input-wrap input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px var(--accent-glow), inset 0 0 12px rgba(0,229,160,0.03);
    }

    .input-wrap input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 3px var(--error-glow);
    }

    .input-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s;
      display: none;
    }

    .input-clear.visible { display: block; }
    .input-clear:hover   { color: var(--accent); }

    /* ── Error message ── */
    .error-msg {
      font-size: 12px;
      color: var(--error);
      letter-spacing: 0.05em;
      min-height: 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .error-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Debounce status ── */
    .calc-status {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 18px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      transition: color 0.2s, opacity 0.2s;
    }

    .calc-status.waiting { color: var(--amber); }
    .calc-status.done    { color: var(--accent-dim); }

    .calc-status .dots span {
      display: inline-block;
      animation: blink 1.2s infinite both;
    }
    .calc-status .dots span:nth-child(2) { animation-delay: 0.2s; }
    .calc-status .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }

    /* ── Result box ── */
    .result-box {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      min-height: 76px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .result-box.has-result {
      border-color: rgba(0,180,120,0.4);
      box-shadow: 0 0 24px rgba(0,229,160,0.08), inset 0 0 20px rgba(0,229,160,0.03);
    }

    .result-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      position: absolute;
      top: 8px;
      left: 20px;
    }

    .result-value {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      transition: color 0.3s, text-shadow 0.3s;
      padding-top: 10px;
    }

    .result-value.active {
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent-glow);
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--accent-dim);
      border-radius: 3px;
      color: var(--accent-dim);
      cursor: pointer;
      padding: 8px 14px;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      transition: all 0.2s;
      flex-shrink: 0;
      align-self: flex-end;
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .copy-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .copy-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* ── Footer ── */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      animation: fadeUp 0.7s ease both 0.3s;
    }

    .footer a {
      color: var(--text-muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .footer a:hover { color: var(--accent); border-color: var(--accent-dim); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    .result-value.pop { animation: pop 0.3s ease; }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .card { padding: 28px 24px 24px; }
      .result-value { font-size: 26px; }
      .title-text h1 { font-size: 15px; }
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="signal-dot"></div>
    <div class="header-label">APRS-IS // <span>PASSCODE GENERATOR</span> // v2.0</div>
  </div>

  <div id="app" class="card">

    <div class="title-row">
      <div class="title-icon">📡</div>
      <div class="title-text">
        <h1>APRS Passcode Generator</h1>
        <p>Enter your station callsign to obtain your APRS-IS network access passcode.</p>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field-label">
      <span>Station Callsign</span>
      <span id="char-counter" class="char-counter">0 / 8</span>
    </div>

    <div class="input-wrap">
      <input
        type="text"
        id="callsign"
        maxlength="8"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="characters"
        spellcheck="false"
        placeholder="e.g. PP5KX"
      />
      <button type="button" id="btn-clear" class="input-clear" title="Clear">✕</button>
    </div>

    <div id="error-msg" class="error-msg">
      <span>⚠</span> <span id="error-text"></span>
    </div>

    <div id="calc-status" class="calc-status"></div>

    <div id="result-box" class="result-box">
      <span class="result-label">Passcode</span>
      <span id="result-value" class="result-value">——</span>
      <button type="button" id="btn-copy" class="copy-btn" style="display:none" title="Copy passcode">
        ⎘ Copy
      </button>
    </div>

  </div>

  <div class="footer">
    Provided by Daniel K. &mdash; PP5KX &nbsp;|&nbsp;
    <a href="https://pp5kx.net" title="pp5kx.net" target="_blank" rel="noopener">pp5kx.net</a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      var debounceTimer   = null;
      var currentPasscode = null;

      var elInput   = document.getElementById('callsign');
      var elCounter = document.getElementById('char-counter');
      var elClear   = document.getElementById('btn-clear');
      var elError   = document.getElementById('error-msg');
      var elErrTxt  = document.getElementById('error-text');
      var elStatus  = document.getElementById('calc-status');
      var elBox     = document.getElementById('result-box');
      var elResult  = document.getElementById('result-value');
      var elCopy    = document.getElementById('btn-copy');

      /* ── Passcode calculation (standard APRS-IS XOR algorithm) ── */
      function calcPasscode(callsign) {
        var i = 0, code = 29666;
        while (i < callsign.length) {
          code = code ^ (callsign.charCodeAt(i) * 256);
          code = code ^ (callsign.charCodeAt(i + 1) || 0);
          i += 2;
        }
        return code & 32767;
      }

      /* ── Display result and auto-copy to clipboard ── */
      function showPasscode(value) {
        currentPasscode = value;
        elResult.textContent = value;
        elResult.classList.add('active');
        elBox.classList.add('has-result');
        elCopy.style.display = 'inline-flex';
        // pop animation
        elResult.classList.remove('pop');
        void elResult.offsetWidth; // force reflow
        elResult.classList.add('pop');
        setTimeout(function () { elResult.classList.remove('pop'); }, 350);
        // auto-copy
        copyToClipboard(String(value), function () {
          elCopy.textContent = '✓ Copied!';
          setTimeout(function () { elCopy.textContent = '⎘ Copy'; }, 2000);
        });
      }

      /* ── Clear result state ── */
      function clearPasscode() {
        currentPasscode = null;
        elResult.textContent = '——';
        elResult.classList.remove('active', 'pop');
        elBox.classList.remove('has-result');
        elCopy.style.display  = 'none';
        elCopy.textContent    = '⎘ Copy';
      }

      /* ── Update character counter ── */
      function updateCounter(len) {
        elCounter.textContent = len + ' / 8';
        elCounter.className   = 'char-counter';
        if (len >= 7)      elCounter.classList.add('warn');
        else if (len >= 3) elCounter.classList.add('active');
      }

      /* ── Debounce status indicator ── */
      function setStatus(state) {
        elStatus.className = 'calc-status';
        if (state === 'waiting') {
          elStatus.classList.add('waiting');
          elStatus.innerHTML = '<span class="dots"><span>●</span><span>●</span><span>●</span></span> <span>Calculating</span>';
        } else if (state === 'done') {
          elStatus.classList.add('done');
          elStatus.innerHTML = '<span>✓</span> <span>Passcode calculated</span>';
        } else {
          elStatus.innerHTML = '';
        }
      }

      /* ── Input event: sanitize, debounce and trigger calculation ── */
      elInput.addEventListener('input', function () {
        var clean = elInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        if (elInput.value !== clean) {
          var pos = elInput.selectionStart - (elInput.value.length - clean.length);
          elInput.value = clean;
          elInput.setSelectionRange(pos, pos);
        }

        updateCounter(clean.length);
        elClear.classList.toggle('visible', clean.length > 0);
        elErrTxt.textContent = '';
        elError.classList.remove('visible');
        clearPasscode();
        setStatus('');

        clearTimeout(debounceTimer);
        if (clean.length >= 3) {
          setStatus('waiting');
          debounceTimer = setTimeout(function () {
            setStatus('done');
            showPasscode(calcPasscode(clean));
          }, 2000);
        }
      });

      /* ── Enter key: immediate calculation, bypasses debounce ── */
      elInput.addEventListener('keydown', function (e) {
        if (e.key !== 'Enter') return;
        clearTimeout(debounceTimer);
        var clean = elInput.value;
        if (clean.length >= 3) {
          setStatus('done');
          showPasscode(calcPasscode(clean));
        }
      });

      /* ── Clear button ── */
      elClear.addEventListener('click', function () {
        clearTimeout(debounceTimer);
        elInput.value = '';
        updateCounter(0);
        elClear.classList.remove('visible');
        elErrTxt.textContent = '';
        elError.classList.remove('visible');
        clearPasscode();
        setStatus('');
        elInput.focus();
      });

      /* ── Shared clipboard helper: modern API with legacy execCommand fallback ── */
      function copyToClipboard(text, callback) {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(callback).catch(function () {
            execCopy(text, callback);
          });
        } else {
          execCopy(text, callback);
        }
      }

      function execCopy(text, callback) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
        document.body.appendChild(ta);
        var sel = document.getSelection();
        var range = document.createRange();
        ta.contentEditable = true;
        ta.readOnly = false;
        range.selectNodeContents(ta);
        sel.removeAllRanges();
        sel.addRange(range);
        ta.setSelectionRange(0, 999999);
        var ok = false;
        try { ok = document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        if (ok) callback();
      }

      /* ── Copy button (manual copy) ── */
      elCopy.addEventListener('click', function (e) {
        e.stopPropagation();
        if (currentPasscode === null) return;
        copyToClipboard(String(currentPasscode), function () {
          elCopy.textContent = '✓ Copied!';
          setTimeout(function () { elCopy.textContent = '⎘ Copy'; }, 2000);
        });
      });

    });
  </script>

</body>
</html>
